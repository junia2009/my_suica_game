<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

<title>スライム合成パズル</title>

<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(120% 90% at 50% -10%, #0b3a5e 0%, #062942 35%, #03203a 65%, #010f22 100%);
    font-family: "Hiragino Maru Gothic ProN", "Rounded Mplus 1c", "Segoe UI", system-ui, sans-serif;
    color: #dbeeff;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #app {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    /* ノッチ/ステータスバー・ホームインジケータ等のセーフエリアを避ける */
    padding:
      env(safe-area-inset-top)
      env(safe-area-inset-right)
      env(safe-area-inset-bottom)
      env(safe-area-inset-left);
  }
  #stage {
    position: relative;
    box-shadow: 0 24px 70px rgba(0, 15, 35, 0.65), 0 0 0 1px rgba(120,200,240,0.12) inset;
    border-radius: 18px;
    overflow: hidden;
    background: #03192f;
  }
  canvas { display: block; }

  /* ---- overlays ---- */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: radial-gradient(120% 100% at 50% 0%, rgba(10,45,72,0.62), rgba(2,15,34,0.78));
    backdrop-filter: blur(4px);
    color: #eaf6ff;
    text-align: center;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .overlay h1 {
    margin: 0;
    font-size: 40px;
    letter-spacing: 2px;
    color: #eafcff;
    text-shadow: 0 0 18px rgba(90,210,255,0.55), 0 2px 2px rgba(0,0,0,0.4);
  }
  .overlay p { margin: 0; font-size: 20px; }
  .overlay .big { font-size: 30px; font-weight: 700; }
  .btn {
    cursor: pointer;
    border: none;
    border-radius: 999px;
    padding: 14px 40px;
    font-size: 22px;
    font-weight: 700;
    font-family: inherit;
    color: #04263a;
    background: linear-gradient(180deg, #7fe9ff, #3fb8e6);
    box-shadow: 0 6px 0 #2b86ad, 0 10px 26px rgba(60,190,240,0.4), 0 0 22px rgba(90,220,255,0.35);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #2b86ad, 0 5px 12px rgba(60,190,240,0.35); }
  /* サブボタン（ずかん等）：控えめなアウトライン */
  .btn.sub {
    padding: 10px 30px;
    font-size: 17px;
    color: #cdeffff2;
    background: rgba(140,210,240,0.10);
    border: 1.5px solid rgba(140,220,255,0.5);
    box-shadow: 0 0 16px rgba(90,220,255,0.18);
  }
  .btn.sub:active { transform: translateY(2px); box-shadow: none; }

  /* ---- タイトル画面 ---------------------------------------------------- */
  /* 背景の深海アニメ（泡・光芒・魚影）を活かすため、暗幕は最小限のグラデのみ */
  #startOverlay {
    gap: 15px;
    background: linear-gradient(180deg,
      rgba(3,22,42,0.16) 0%,
      rgba(2,14,30,0.40) 52%,
      rgba(1,8,20,0.74) 100%);
    backdrop-filter: none;
  }
  .titleLockup {
    display: flex; flex-direction: column; align-items: center; gap: 9px;
    animation: floatY 4.6s ease-in-out infinite;
  }
  .titleEn {
    font-size: 12px; font-weight: 700;
    letter-spacing: 7px; text-indent: 7px;
    color: rgba(150,225,255,0.92);
    text-shadow: 0 0 12px rgba(90,200,255,0.55);
  }
  .titleMain {
    font-size: clamp(52px, 17vw, 74px);
    font-weight: 900; line-height: 1.04; letter-spacing: 0.02em;
    background: linear-gradient(180deg, #ffffff 6%, #c4efff 36%, #58c8f5 70%, #a4e4ff 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 3px 1px rgba(4,24,48,0.9)) drop-shadow(0 0 26px rgba(80,200,255,0.38));
  }
  .titleSub {
    display: flex; align-items: center; gap: 14px;
    font-size: clamp(16px, 5vw, 20px); font-weight: 800;
    letter-spacing: 8px; text-indent: 8px;
    color: #def3ff;
    text-shadow: 0 0 14px rgba(90,200,255,0.5), 0 2px 3px rgba(0,0,0,0.55);
  }
  .titleSub .line {
    width: 34px; height: 2px; border-radius: 2px;
    background: linear-gradient(90deg, transparent, rgba(140,220,255,0.85));
  }
  .titleSub .line.r { transform: scaleX(-1); }
  #heroSlime {
    animation: floatY 3.4s ease-in-out infinite reverse;
    filter: drop-shadow(0 14px 16px rgba(0,10,25,0.55));
  }
  #startOverlay .tagline {
    font-size: 14.5px; line-height: 1.95; letter-spacing: 1px;
    color: #cfe9f8; text-shadow: 0 1px 4px rgba(0,10,25,0.8);
  }
  .bestChip {
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    color: #ffe2a3; background: rgba(255,205,110,0.08);
    border: 1px solid rgba(255,210,130,0.4); border-radius: 999px;
    padding: 6px 22px;
    text-shadow: 0 0 10px rgba(255,190,80,0.4);
  }
  .btn.primary {
    position: relative; overflow: hidden;
    width: min(78%, 300px);
    padding: 16px 0; font-size: 21px; letter-spacing: 8px; text-indent: 8px;
    animation: pulseGlow 2.8s ease-in-out infinite;
  }
  .btn.primary::after {
    content: ''; position: absolute; top: 0; left: -70%;
    width: 55%; height: 100%;
    background: linear-gradient(105deg, transparent, rgba(255,255,255,0.55), transparent);
    transform: skewX(-12deg);
    animation: sheen 3.6s ease-in-out infinite;
  }
  @keyframes floatY { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
  @keyframes pulseGlow {
    0%,100% { box-shadow: 0 6px 0 #2b86ad, 0 10px 26px rgba(60,190,240,0.4), 0 0 22px rgba(90,220,255,0.3); }
    50%     { box-shadow: 0 6px 0 #2b86ad, 0 10px 26px rgba(60,190,240,0.5), 0 0 46px rgba(120,230,255,0.65); }
  }
  @keyframes sheen { 0% { left: -70%; } 45% { left: 125%; } 100% { left: 125%; } }
  @media (prefers-reduced-motion: reduce) {
    .titleLockup, #heroSlime, .btn.primary { animation: none; }
    .btn.primary::after { display: none; }
  }

  /* 図鑑 */
  /* タイトル・進捗・ボタンは固定サイズのまま、グリッドだけが縮んで
     スクロールする。ステージがどんな高さでもボタンが見切れない。 */
  #dexOverlay { padding: 26px 0 24px; }
  #dexOverlay h1, #dexProgress, #dexOverlay .btn { flex-shrink: 0; }
  #dexProgress { font-size: 16px; opacity: 0.9; letter-spacing: 1px; }
  #dexGrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: min(92%, 430px);
    flex: 0 1 auto;
    min-height: 0;
    max-height: 58vh;
    overflow-y: auto;
    padding: 6px 4px;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
    overscroll-behavior: contain;
  }
  .dexCell {
    background: rgba(140,210,240,0.08);
    border: 1px solid rgba(140,220,255,0.18);
    border-radius: 14px;
    padding: 8px 5px 9px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .dexCell.locked { opacity: 0.7; }
  .dexCell canvas { width: 66px; height: 66px; }
  .dexCell .nm { font-size: 12.5px; font-weight: 700; color: #eaf6ff; }
  .dexCell .ds { font-size: 10px; opacity: 0.72; line-height: 1.3; min-height: 26px; text-align: center; }
  .stat-card {
    background: rgba(140,210,240,0.10);
    border: 1px solid rgba(140,220,255,0.30);
    border-radius: 16px;
    padding: 14px 26px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .muteBtn {
    position: absolute;
    right: 10px;
    bottom: 10px;
    z-index: 5;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 20px;
    color: #eaf6ff;
    background: rgba(20,55,85,0.6);
    border: 1px solid rgba(140,220,255,0.3);
    box-shadow: 0 3px 10px rgba(0,0,0,0.35);
  }
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <canvas id="game"></canvas>
    <button id="mute" class="muteBtn" title="サウンド切替">🔊</button>

    <div id="startOverlay" class="overlay show">
      <div class="titleLockup">
        <div class="titleEn">DEEP SEA PUZZLE</div>
        <div class="titleMain">スライム</div>
        <div class="titleSub"><span class="line"></span>合成パズル<span class="line r"></span></div>
      </div>
      <canvas id="heroSlime"></canvas>
      <p class="tagline">同じスライムをぶつけて合体。<br>めざせ、深海の王・スライムキング。</p>
      <div id="titleBest" class="bestChip" hidden>BEST 0</div>
      <button id="startBtn" class="btn primary">スタート</button>
      <button id="dexBtnStart" class="btn sub">ずかん</button>
    </div>

    <div id="overOverlay" class="overlay">
      <h1>ゲームオーバー</h1>
      <div class="stat-card">
        <p>スコア <span id="finalScore" class="big">0</span></p>
        <p>ハイスコア <span id="finalBest" class="big">0</span></p>
        <p>到達スライム <span id="finalMax" class="big">-</span></p>
        <p>さいだい水深 <span id="finalDepth" class="big">0</span> m</p>
      </div>
      <button id="retryBtn" class="btn primary">もう一回</button>
      <button id="dexBtnOver" class="btn sub">ずかん</button>
    </div>

    <div id="dexOverlay" class="overlay">
      <h1 style="font-size:30px;">ずかん</h1>
      <div id="dexProgress"></div>
      <div id="dexGrid"></div>
      <button id="dexClose" class="btn">とじる</button>
    </div>
  </div>
</div>

<!-- Matter.js: ローカル同梱を優先し、無ければ CDN にフォールバック -->
<script src="matter.min.js" onerror="(function(){var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js';document.head.appendChild(s);})()"></script>
<script>
/* =========================================================================
   スライム合成パズル  (Matter.js + Canvas2D, Vanilla JS)
   仕様書 §1-14 に対応。物理は「常に円」、見た目の変形/表情は描画層のみ。
   ========================================================================= */
(() => {
'use strict';

const { Engine, World, Bodies, Body, Composite, Events } = Matter;

// ---- 論理サイズ -------------------------------------------------
// 横幅は固定で少し縮小。高さは端末の画面比に合わせて起動時に決定し、
// 縦長スマホで上下に大きな余白（デッドゾーン）が出ないようにする。
const W = 560;               // 横幅（従来640から縮小）
const WALL = 14;             // 壁を薄くして端ギリギリまで置けるように
const BOTTOM_UI = 88;        // 底の下に確保する帯（音量ボタン用の台座）
let H = 940;                 // computeLogicalSize() で画面比から上書き
let FLOOR = H - BOTTOM_UI;   // 水槽の床の y（この上でスライムが積まれる）
let DEAD_LINE = 150;         // デッドライン y（Hに比例、同上）
const DEAD_TIME = 1.5;       // 超過継続でゲームオーバー(秒)
const COOLDOWN = 420;        // 投下クールダウン(ms)
const GAMEOVER_GRACE = 1200; // 開始直後の判定猶予(ms)

// セーフエリアを除いた実際に使える領域（#app のコンテンツボックス）
function getAvail(){
  const app = document.getElementById('app');
  const cs = getComputedStyle(app);
  const w = app.clientWidth  - parseFloat(cs.paddingLeft || 0) - parseFloat(cs.paddingRight  || 0);
  const h = app.clientHeight - parseFloat(cs.paddingTop  || 0) - parseFloat(cs.paddingBottom || 0);
  return { w: Math.max(1, w), h: Math.max(1, h) };
}

function computeLogicalSize(){
  const a = getAvail();
  // 安全領域の縦横比に合わせて H を決定（極端に細長く/短くならないようクランプ）
  H = Math.round(Math.min(W*2.0, Math.max(W*1.35, W * (a.h / a.w))));
  FLOOR = H - BOTTOM_UI;     // 床を少し上げ、下部の帯に音量ボタンを置く
  DEAD_LINE = Math.round(H * 0.15);
}

// 2つの16進色を線形補間して 'rgb()' を返す
function lerpHex(h1, h2, t){
  const c1 = hexToRgb(h1), c2 = hexToRgb(h2);
  return `rgb(${Math.round(c1.r+(c2.r-c1.r)*t)},${Math.round(c1.g+(c2.g-c1.g)*t)},${Math.round(c1.b+(c2.b-c1.b)*t)})`;
}

// スコアから水深とゾーン（背景色・光量）を求める
function updateDepth(){
  depthM = Math.max(0, Math.floor(score * DEPTH_PER_SCORE));
  let i = 0;
  while(i < ZONES.length-1 && depthM >= ZONES[i+1].depth) i++;
  const a = ZONES[i], b = ZONES[Math.min(i+1, ZONES.length-1)];
  const span = (b.depth - a.depth) || 1;
  const t = Math.max(0, Math.min(1, (depthM - a.depth) / span));
  envCol.top = lerpHex(a.top, b.top, t);
  envCol.mid = lerpHex(a.mid, b.mid, t);
  envCol.bot = lerpHex(a.bot, b.bot, t);
  envCol.ray = a.ray + (b.ray - a.ray) * t;
  envCol.surf = a.surf + (b.surf - a.surf) * t;
  zoneName = a.name;
}

// ---- スライム定義 (§2) --------------------------------------------------
// score は三角数ベース n(n+1)/2
const SLIMES = [
  null, // index 0 未使用（rank=1始まり）
  { rank:1,  name:'しずく',        r:20,  color:'#7ec8e3', score:1,  desc:'海面から落ちてきた小さな雫。すべての始まり。' },
  { rank:2,  name:'こつぶ',        r:28,  color:'#a8d84f', score:3,  desc:'ふたつ寄り添って生まれた粒。ぷるぷる元気。' },
  { rank:3,  name:'ぷにまる',      r:38,  color:'#5fbf5f', score:6,  desc:'ほっぺが自慢のまんまるスライム。' },
  { rank:4,  name:'あおスラ',      r:46,  color:'#4a7fd6', score:10, desc:'深い青をまとった、少し大人なスライム。' },
  { rank:5,  name:'むらさき',      r:56,  color:'#9b6fd6', score:15, desc:'ツノが生えはじめた証。ちょっと得意げ。' },
  { rank:6,  name:'ももスラ',      r:68,  color:'#f28ab2', score:21, desc:'桃色のやわらか個体。深海のアイドル。' },
  { rank:7,  name:'きんスラ',      r:80,  color:'#f2c14e', score:28, desc:'王冠を戴く金色のスライム。風格が出てきた。' },
  { rank:8,  name:'にじスラ',      r:96,  color:'#7fd6c8', score:36, rainbow:true, desc:'虹色に輝き、羽まで生えた幻の個体。' },
  { rank:9,  name:'ほしスラ',      r:112, color:'#2e2b6b', score:45, desc:'夜空を宿したような星柄。深層の主。' },
  { rank:10, name:'おおスラ',      r:128, color:'#f0f0f5', score:55, desc:'もこもこの雲をまとう巨大スライム。' },
  { rank:11, name:'スライムキング', r:148, color:'#c8b0ff', score:66, metal:true, desc:'マントを翻す深海の王。到達できれば真の達人。' },
];
const MAX_RANK = 11;
const DROPPABLE_MAX = 5; // 投下候補は rank1〜5

// ---- 深度ゾーン（進行演出） --------------------------------------------
// スコアが上がるほど深く潜り、背景色・光芒・水面光が段階的に変化する。
const DEPTH_PER_SCORE = 1.0;   // スコア1につき何m潜るか
const ZONES = [
  { name:'サンライトゾーン',   depth:0,    top:'#0e4a72', mid:'#0a3557', bot:'#03152a', ray:1.00, surf:0.28 },
  { name:'トワイライトゾーン', depth:200,  top:'#083a5e', mid:'#05263f', bot:'#02101f', ray:0.55, surf:0.16 },
  { name:'ミッドナイトゾーン', depth:500,  top:'#04233c', mid:'#031828', bot:'#010a15', ray:0.22, surf:0.07 },
  { name:'アビサルゾーン',     depth:1000, top:'#02182b', mid:'#02101c', bot:'#01060f', ray:0.06, surf:0.03 },
  { name:'ヘイダルゾーン',     depth:2000, top:'#010f1e', mid:'#010912', bot:'#000509', ray:0.00, surf:0.00 },
];

// ---- 特殊スライム（能力持ち・レア出現） --------------------------------
const SPECIALS = {
  bomb: { name:'ボムスライム', r:32, color:'#3b4250', glow:'#ff6a3c',
          desc:'ぶつかると爆発し、まわりのスライムを消し飛ばす危険な個体。' },
  wild: { name:'ワイルドスライム', r:30, color:'#8fd0ff', rainbow:true,
          desc:'どんなスライムとも合体できる万能個体。1つ上へ進化させる。' },
};
const SPECIAL_KINDS = ['bomb', 'wild'];
const SPECIAL_CHANCE = 0.07;   // 次の投下が特殊になる確率

// =========================================================================
//  オーディオ（WebAudio 簡易効果音）
// =========================================================================
const SFX = (() => {
  let ctx = null, muted = false;
  function ac(){ if(!ctx){ try{ ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return ctx; }
  function resume(){ const c=ac(); if(c && c.state==='suspended') c.resume(); }
  function tone(freq, dur, type='sine', vol=0.2, slideTo=null){
    const c = ac(); if(!c || muted) return;
    const o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, c.currentTime);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, c.currentTime + dur);
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime + dur + 0.02);
  }
  return {
    drop(){ tone(300, 0.08, 'sine', 0.15, 180); },
    merge(rank){ const base = 300 + rank*45; tone(base, 0.16, 'triangle', 0.22, base*1.6); setTimeout(()=>tone(base*1.5,0.14,'sine',0.15),60); },
    chain(n){ tone(500 + n*120, 0.18, 'square', 0.16, (500+n*120)*1.4); },
    king(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,0.25,'triangle',0.25),i*90)); },
    over(){ [400,300,220,160].forEach((f,i)=>setTimeout(()=>tone(f,0.3,'sawtooth',0.2),i*120)); },
    tideWarn(){ tone(150, 0.5, 'sine', 0.10, 260); },                 // 海流の予告
    tide(){ tone(90, 1.2, 'sawtooth', 0.10, 200); tone(70, 1.2, 'sine', 0.06, 150); }, // 海流の到来（ゴーッ）
    boom(){ tone(130, 0.4, 'sawtooth', 0.26, 40); setTimeout(()=>tone(80,0.3,'square',0.18,30),25); }, // 爆発
    toggle(){ muted = !muted; return muted; },
    resume,
  };
})();

// =========================================================================
//  ゲーム本体
// =========================================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let gfx = ctx;   // スライム描画の出力先。図鑑サムネ描画時だけ一時的に差し替える。

let engine, world;
let bodies = [];          // slime bodies (Matterのbody, .plugin.slimeにメタ)
let particles = [];       // 合体エフェクト
let rings = [];           // 波紋エフェクト
let scorePops = [];       // スコア表示ポップ
let bubbles = [];         // 深海：立ち上る泡（装飾・常時）
let motes = [];           // 深海：マリンスノー（漂う微粒子）
let popBubbles = [];      // 合体/着地で発生する一時的な泡
let seaweeds = [];        // 遠景：海藻シルエット
let fishes = [];          // 遠景：魚影シルエット
let flash = 0;            // 発光フラッシュの強さ(0..1)
let flashColor = '#ffffff';
let flashX = W/2, flashY = H/2;
let causticCanvas, causticCtx, causticImg; // コースティクス用オフスクリーン

let state = 'ready';      // ready | playing | over
let score = 0;
let bestScore = +(localStorage.getItem('slime_best') || 0);
let maxRankReached = 1;

// 深度（進行演出）：現在のゾーン色などを保持
let depthM = 0;
let zoneName = ZONES[0].name;
const envCol = { top: ZONES[0].top, mid: ZONES[0].mid, bot: ZONES[0].bot, ray: ZONES[0].ray, surf: ZONES[0].surf };

// 図鑑：これまで出現させた rank（localStorage永続）
let discovered = new Set();
try { discovered = new Set(JSON.parse(localStorage.getItem('slime_dex') || '[]')); } catch(_) {}
function discover(rank){
  if(!discovered.has(rank)){
    discovered.add(rank);
    localStorage.setItem('slime_dex', JSON.stringify([...discovered]));
  }
}

let current = null;       // 待機アイテム {rank} または {special}
let nextItem = { rank: 1 };  // next プレビュー {rank} または {special}
let pointerX = W/2;
let canDrop = true;
let dropCooldownUntil = 0;
let startedAt = 0;

// 連鎖管理
let chainCount = 0;
let chainTimer = 0;       // これが正の間に合体が起きると連鎖継続

// デッドライン超過タイマー
let overLineTime = 0;

// 潮の流れ（海流）：idle → warn（予告）→ active（発生）を繰り返す
let tide = { phase:'idle', timer: 10, dir: 1, dur: 0, strength: 0, vx: 0, streaks: [] };
function initTide(){
  tide.phase = 'idle';
  tide.timer = 9 + Math.random()*7;   // 最初の海流までの待ち
  tide.dir = 1; tide.dur = 0; tide.strength = 0; tide.vx = 0;
  tide.streaks = [];
  for(let i=0;i<26;i++){
    tide.streaks.push({
      x: Math.random()*W,
      y: DEAD_LINE + Math.random()*(FLOOR - DEAD_LINE),
      len: 40 + Math.random()*120,
      spd: 0.6 + Math.random()*0.9,   // vx倍率
      a: 0.15 + Math.random()*0.3,
    });
  }
}
const TIDE_WARN = 1.7;                 // 予告の長さ(秒)
function updateTide(dt){
  if(state !== 'playing'){ tide.strength = 0; tide.vx = 0; return; }
  tide.timer -= dt;
  if(tide.phase === 'idle'){
    if(tide.timer <= 0){
      tide.phase = 'warn'; tide.timer = TIDE_WARN;
      tide.dir = Math.random() < 0.5 ? -1 : 1;
      SFX.tideWarn();
    }
  } else if(tide.phase === 'warn'){
    if(tide.timer <= 0){
      tide.phase = 'active';
      tide.dur = 2.6 + Math.random()*1.8;
      tide.timer = tide.dur;
      SFX.tide();
    }
  } else if(tide.phase === 'active'){
    // 強さの包絡：立ち上がり0.5s・減衰0.7sでなめらかに
    const elapsed = tide.dur - tide.timer;
    const easeIn = Math.min(1, elapsed / 0.5);
    const easeOut = Math.min(1, tide.timer / 0.7);
    tide.strength = Math.min(easeIn, easeOut);
    if(tide.timer <= 0){
      tide.phase = 'idle';
      tide.timer = 11 + Math.random()*8;
      tide.strength = 0;
    }
  }
  // 見た目用の水平速度(px/s)。warn中はごく弱く漂わせる
  const visK = tide.phase === 'active' ? tide.strength : (tide.phase === 'warn' ? 0.12 : 0);
  tide.vx = tide.dir * 150 * visK;
  // ストリーク移動
  if(tide.vx !== 0){
    for(const s of tide.streaks){
      s.x += tide.vx * s.spd * dt;
      if(s.x > W + s.len) s.x = -s.len;
      else if(s.x < -s.len) s.x = W + s.len;
    }
  }
}
// 物理：海流の力を各スライムへ（massに比例＝一様加速）
function applyTideForce(){
  if(tide.phase !== 'active' || tide.strength <= 0) return;
  const base = world.gravity.scale * world.gravity.y; // 1updateあたりの重力係数
  const fx = tide.dir * tide.strength * base * 0.7;    // 重力の約0.7倍を横に
  for(const b of bodies){
    Body.applyForce(b, b.position, { x: fx * b.mass, y: 0 });
  }
}

// -------------------------------------------------------------------------
//  DPR対応リサイズ
// -------------------------------------------------------------------------
function fitStage(){
  const stage = document.getElementById('stage');
  const a = getAvail();
  const pad = 12;
  const availW = a.w - pad;
  const availH = a.h - pad;
  const scale = Math.min(availW / W, availH / H, 1.1);
  const cssW = Math.round(W * scale);
  const cssH = Math.round(H * scale);
  stage.style.width = cssW + 'px';
  stage.style.height = cssH + 'px';

  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // 音量ボタンを底の下の台座帯（キャンバスは拡縮するがボタンは固定CSSサイズ）
  // の中に必ず収まるよう、スケールに応じてサイズ・位置を合わせる。
  const muteBtn = document.getElementById('mute');
  if(muteBtn){
    const baseCss = (BOTTOM_UI - WALL) * scale;         // 台座帯のCSS高さ
    const bs = Math.max(26, Math.min(44, baseCss * 0.74));
    muteBtn.style.width = bs + 'px';
    muteBtn.style.height = bs + 'px';
    muteBtn.style.bottom = Math.max(4, (baseCss - bs) / 2) + 'px';
    muteBtn.style.right = Math.max(8, baseCss * 0.28) + 'px';
    muteBtn.style.fontSize = (bs * 0.48) + 'px';
  }
}
window.addEventListener('resize', fitStage);

// -------------------------------------------------------------------------
//  Matter セットアップ (§6)
// -------------------------------------------------------------------------
function setupPhysics(){
  engine = Engine.create();
  world = engine.world;
  engine.gravity.y = 1.0;

  const wallOpt = { isStatic:true, restitution:0.1, friction:0.5, label:'wall' };
  World.add(world, [
    Bodies.rectangle(W/2, FLOOR + WALL, W + WALL*2, WALL*2, wallOpt),          // 底（上面がFLOOR）
    Bodies.rectangle(-WALL/2, H/2, WALL, H*2, wallOpt),                        // 左
    Bodies.rectangle(W + WALL/2, H/2, WALL, H*2, wallOpt),                     // 右
  ]);

  Events.on(engine, 'collisionStart', onCollision);
}

// -------------------------------------------------------------------------
//  スライム生成
// -------------------------------------------------------------------------
function makeSlime(rank, x, y, vx=0, vy=0){
  const def = SLIMES[rank];
  const body = Bodies.circle(x, y, def.r, {
    restitution: 0.15,
    friction: 0.3,
    frictionStatic: 0.5,
    density: 0.001,
    label: 'slime',
  });
  body.plugin.slime = {
    rank,
    r: def.r,
    special: null,
    merged: false,
    // 描画用アニメ状態
    squash: 0,          // >0で縦に潰れる
    spawnPop: 1,        // 生成時ポップ (1→0)
    blink: Math.random()*4 + 2, // まばたきタイマー
    blinkPhase: 0,
    face: Math.floor(Math.random()*1000),
    wobble: Math.random()*Math.PI*2,
    prevY: y,
  };
  Body.setVelocity(body, { x:vx, y:vy });
  World.add(world, body);
  bodies.push(body);
  if(rank > maxRankReached) maxRankReached = rank;
  discover(rank);   // 図鑑に登録
  return body;
}

// 特殊スライム（能力持ち）を生成
function makeSpecial(kind, x, y){
  const sp = SPECIALS[kind];
  const body = Bodies.circle(x, y, sp.r, {
    restitution: 0.15, friction: 0.3, frictionStatic: 0.5, density: 0.001, label: 'slime',
  });
  body.plugin.slime = {
    rank: 0, r: sp.r, special: kind, merged: false,
    squash: 0, spawnPop: 1, blink: Math.random()*4 + 2, blinkPhase: 0,
    face: Math.floor(Math.random()*1000), wobble: Math.random()*Math.PI*2, prevY: y,
  };
  World.add(world, body);
  bodies.push(body);
  discover(kind);
  return body;
}

// 表示用のラジアス／色を得るヘルパ
function metaColor(s){ return s.special ? (SPECIALS[s.special].glow || SPECIALS[s.special].color) : SLIMES[s.rank].color; }

// -------------------------------------------------------------------------
//  合体ロジック (§7)
// -------------------------------------------------------------------------
function midpoint(a, b){ return { x:(a.position.x+b.position.x)/2, y:(a.position.y+b.position.y)/2 }; }

function onCollision(ev){
  for(const pair of ev.pairs){
    const a = pair.bodyA, b = pair.bodyB;
    if(a.label !== 'slime' || b.label !== 'slime') continue;
    const sa = a.plugin.slime, sb = b.plugin.slime;
    if(!sa || !sb) continue;
    if(sa.merged || sb.merged) continue;   // 二重合体防止

    const aBomb = sa.special === 'bomb', bBomb = sb.special === 'bomb';
    const aWild = sa.special === 'wild', bWild = sb.special === 'wild';

    // ボム：スライムに触れたら爆発（相手の種類は問わない）
    if(aBomb || bBomb){
      const bombBody = aBomb ? a : b;
      bombBody.plugin.slime.merged = true;
      detonate(bombBody);
      continue;
    }

    // ワイルド：相手とどれでも合体
    if(aWild || bWild){
      const other = aWild ? b : a;
      const otherS = other.plugin.slime;
      const mid = midpoint(a, b);
      sa.merged = true; sb.merged = true;
      removeBody(a); removeBody(b);
      if(otherS.special === 'wild') doMerge(2, mid);            // ワイルド同士 → rank2
      else if(otherS.rank >= MAX_RANK) kingMerge(mid);         // 相手がキング → 消して大ボーナス
      else doMerge(otherS.rank + 1, mid);                      // 相手の1つ上へ進化
      continue;
    }

    // 通常：同ランク同士のみ
    if(sa.rank !== sb.rank) continue;
    sa.merged = true; sb.merged = true;
    const mid = midpoint(a, b);
    removeBody(a); removeBody(b);
    if(sa.rank === MAX_RANK) kingMerge(mid);                    // キング同士
    else doMerge(sa.rank + 1, mid);
  }

  // ---- 着地・衝突の連動泡（合体以外の強い接触で発生・body毎にスロットル） ----
  for(const pair of ev.pairs){
    const a = pair.bodyA, b = pair.bodyB;
    const aS = a.label === 'slime', bS = b.label === 'slime';
    if(!aS && !bS) continue;
    const body = aS ? a : b;
    const s = body.plugin.slime;
    if(!s || s.merged) continue;
    const sp = body.speed;                       // 接触時の速さ
    if(sp < 3.2) continue;
    const now = performance.now();
    if(now - (s.lastBubble || 0) < 200) continue;
    s.lastBubble = now;
    const sup = pair.collision && pair.collision.supports && pair.collision.supports[0];
    const px = sup ? sup.x : body.position.x;
    const py = sup ? sup.y : body.position.y;
    spawnBubbles(px, py, Math.min(5, 1 + Math.floor(sp/2.2)), s.r*0.7);
  }
}

// 通常合体（生成＋連鎖＋スコア＋演出）
function doMerge(newRank, mid){
  if(newRank > MAX_RANK){ kingMerge(mid); return; }
  const nb = makeSlime(newRank, mid.x, mid.y);
  nb.plugin.slime.squash = 0.6;
  nb.plugin.slime.spawnPop = 1;
  chainCount++;
  chainTimer = 0.5;
  const def = SLIMES[newRank];
  const chainMult = chainCount > 1 ? chainCount : 1;
  addScore(def.score * chainMult, mid.x, mid.y, chainCount > 1, chainCount);
  burst(mid.x, mid.y, def.color, 14 + newRank);
  rings.push({ x:mid.x, y:mid.y, r:def.r*0.5, max:def.r*2.2, life:1, color:def.color });
  spawnBubbles(mid.x, mid.y, 4 + newRank, def.r*1.1);
  if(newRank >= 7){
    const glowCol = def.rainbow ? '#8fe9ff' : (def.metal ? '#e0c8ff' : def.color);
    triggerFlash(glowCol, 0.28 + (newRank-7)*0.14, mid.x, mid.y);
  }
  SFX.merge(newRank);
  if(chainCount > 1) SFX.chain(chainCount);
  shake(Math.min(3 + newRank*0.8, 12));
}

// キング同士（またはワイルド＋キング）→ 消して大ボーナス
function kingMerge(mid){
  addScore(999, mid.x, mid.y, true);
  burst(mid.x, mid.y, '#ffe08a', 40);
  rings.push({ x:mid.x, y:mid.y, r:10, max:260, life:1, color:'#fff2b0' });
  spawnBubbles(mid.x, mid.y, 34, 90);
  triggerFlash('#fff2b0', 0.95, mid.x, mid.y);
  SFX.king();
  shake(16);
}

// ボム爆発：周囲のスライムを巻き込んで消す
function detonate(bombBody){
  const s0 = bombBody.plugin.slime;
  const bx = bombBody.position.x, by = bombBody.position.y;
  const R = s0.r * 3.6;                 // 爆風半径
  removeBody(bombBody);
  let cleared = 0, gained = 0;
  for(const other of [...bodies]){
    const os = other.plugin.slime;
    if(!os || os.merged) continue;
    const d = Math.hypot(other.position.x - bx, other.position.y - by);
    if(d < R + os.r){
      os.merged = true;
      const sc = os.special ? 5 : SLIMES[os.rank].score;
      gained += Math.ceil(sc * 0.6);
      burst(other.position.x, other.position.y, metaColor(os), 8);
      spawnBubbles(other.position.x, other.position.y, 4, os.r);
      removeBody(other);
      cleared++;
    }
  }
  if(gained > 0) addScore(gained, bx, by, cleared > 1, 0);
  burst(bx, by, '#ff8a4a', 34);
  rings.push({ x:bx, y:by, r:12, max:R*2, life:1, color:'#ff9a5a' });
  triggerFlash('#ff7a3c', 0.55, bx, by);
  SFX.boom();
  shake(14);
}

function removeBody(body){
  World.remove(world, body);
  const i = bodies.indexOf(body);
  if(i >= 0) bodies.splice(i, 1);
}

function addScore(amount, x, y, isChain=false, chain=0){
  score += amount;
  scorePops.push({
    x, y: y - 10, life: 1,
    text: (isChain ? '+'+amount : '+'+amount),
    sub: chain > 1 ? chain+' れんさ！' : '',
    big: isChain,
  });
}

// -------------------------------------------------------------------------
//  投下フロー (§4, §5)
// -------------------------------------------------------------------------
function randomDropRank(){
  // 低ランクほど出やすい重み付け
  const weights = [0,5,4,3,2,1]; // rank1..5
  let total = 0; for(let r=1;r<=DROPPABLE_MAX;r++) total += weights[r];
  let x = Math.random()*total;
  for(let r=1;r<=DROPPABLE_MAX;r++){ x -= weights[r]; if(x<=0) return r; }
  return 1;
}

// 次に投下するアイテム（低確率で特殊スライム）
function randomDropItem(){
  if(Math.random() < SPECIAL_CHANCE){
    return { special: SPECIAL_KINDS[Math.floor(Math.random()*SPECIAL_KINDS.length)] };
  }
  return { rank: randomDropRank() };
}

// アイテムの半径
function itemRadius(item){
  return item.special ? SPECIALS[item.special].r : SLIMES[item.rank].r;
}

function prepareNext(){
  current = nextItem;
  nextItem = randomDropItem();
}

function clampDropX(r){
  return Math.max(WALL + r, Math.min(W - WALL - r, pointerX));
}

function dropCurrent(){
  if(state !== 'playing' || !current || !canDrop) return;
  const r = itemRadius(current);
  const x = clampDropX(r);
  const y = DEAD_LINE - 30;
  if(current.special) makeSpecial(current.special, x, y);
  else makeSlime(current.rank, x, y);
  SFX.drop();

  current = null;
  canDrop = false;
  dropCooldownUntil = performance.now() + COOLDOWN;
}

// -------------------------------------------------------------------------
//  ゲームオーバー判定 (§8)
// -------------------------------------------------------------------------
function checkGameOver(dt){
  if(performance.now() - startedAt < GAMEOVER_GRACE){ overLineTime = 0; return; }
  let over = false;
  for(const b of bodies){
    const s = b.plugin.slime;
    if(s.merged) continue;
    const r = s.r;
    // ある程度落ち着いた（低速）スライムがデッドラインを超えているか
    if(b.position.y - r < DEAD_LINE && Math.abs(b.velocity.y) < 1.2){
      over = true; break;
    }
  }
  if(over){
    overLineTime += dt;
    if(overLineTime >= DEAD_TIME) gameOver();
  } else {
    overLineTime = Math.max(0, overLineTime - dt*2); // 回復は速め
  }
}

function gameOver(){
  if(state === 'over') return;
  state = 'over';
  SFX.over();
  if(score > bestScore){ bestScore = score; localStorage.setItem('slime_best', String(bestScore)); }
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalBest').textContent = bestScore;
  document.getElementById('finalMax').textContent = SLIMES[maxRankReached].name;
  document.getElementById('finalDepth').textContent = depthM;
  document.getElementById('overOverlay').classList.add('show');
}

// -------------------------------------------------------------------------
//  カメラシェイク
// -------------------------------------------------------------------------
let shakeAmt = 0;
function shake(a){ shakeAmt = Math.max(shakeAmt, a); }

// -------------------------------------------------------------------------
//  エフェクト
// -------------------------------------------------------------------------
function burst(x, y, color, n){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2;
    const sp = 2 + Math.random()*5;
    particles.push({
      x, y,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 2,
      life: 1, r: 2 + Math.random()*4, color,
    });
  }
}

function updateEffects(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.35; p.vx *= 0.98;
    p.life -= dt*1.8;
    if(p.life <= 0) particles.splice(i,1);
  }
  for(let i=rings.length-1;i>=0;i--){
    const rg = rings[i];
    rg.r += (rg.max - rg.r) * 0.18;
    rg.life -= dt*2.2;
    if(rg.life <= 0) rings.splice(i,1);
  }
  for(let i=scorePops.length-1;i>=0;i--){
    const sp = scorePops[i];
    sp.y -= 0.6; sp.life -= dt*1.1;
    if(sp.life <= 0) scorePops.splice(i,1);
  }
}

// -------------------------------------------------------------------------
//  深海アンビエント（泡・マリンスノー）— ゲーム状態に関係なく常時アニメ
// -------------------------------------------------------------------------
function newBubble(anywhere){
  const r = 2 + Math.random()*7;
  return {
    x: Math.random()*W,
    y: anywhere ? Math.random()*H : H + 12,
    r,
    speed: 18 + Math.random()*46 + r*3,   // 大きい泡ほど速く上る
    wobA: Math.random()*Math.PI*2,
    wobF: 0.6 + Math.random()*1.6,
    wobAmp: 4 + Math.random()*12,
    alpha: 0.10 + Math.random()*0.22,
    front: Math.random() < 0.22,           // 一部は手前（スライムより前）
  };
}
function initAmbient(){
  bubbles = [];
  for(let i=0;i<30;i++) bubbles.push(newBubble(true));
  motes = [];
  for(let i=0;i<46;i++) motes.push({
    x: Math.random()*W, y: Math.random()*H,
    r: 0.4 + Math.random()*1.7,
    vx: (Math.random()-0.5)*6, vy: 6 + Math.random()*10, // ゆっくり沈むマリンスノー
    a: 0.12 + Math.random()*0.4, ph: Math.random()*Math.PI*2,
  });
  popBubbles = [];
}
function updateAmbient(dt){
  const drift = tide.vx * dt;               // 海流による水平ドリフト
  for(const b of bubbles){
    b.y -= b.speed*dt;
    b.x += drift;
    b.wobA += b.wobF*dt;
    if(b.x < -16) b.x += W+32; else if(b.x > W+16) b.x -= W+32;
    if(b.y < -16) Object.assign(b, newBubble(false));
  }
  for(const m of motes){
    m.ph += dt*2;
    m.x += m.vx*dt + drift; m.y += m.vy*dt;
    if(m.y > H+4){ m.y = -4; m.x = Math.random()*W; }
    if(m.x < -4) m.x = W+4; else if(m.x > W+4) m.x = -4;
  }
  // 一時的な泡（上昇しながらフェード・海流に流される）
  for(let i=popBubbles.length-1;i>=0;i--){
    const b = popBubbles[i];
    b.y -= b.speed*dt;
    b.x += drift;
    b.wobA += b.wobF*dt;
    b.life -= dt*0.8;
    if(b.life <= 0 || b.y < -16) popBubbles.splice(i,1);
  }
}

// -------------------------------------------------------------------------
//  コースティクス（水面の揺らぐ網目光）— 低解像度オフスクリーン→拡大合成
// -------------------------------------------------------------------------
const CW = 96, CH = 120;
function initCaustics(){
  causticCanvas = document.createElement('canvas');
  causticCanvas.width = CW; causticCanvas.height = CH;
  causticCtx = causticCanvas.getContext('2d');
  causticImg = causticCtx.createImageData(CW, CH);
}
function drawCaustics(t, intensity){
  const k = intensity === undefined ? 1 : intensity;
  const tt = t*0.0011;
  const d = causticImg.data;
  let i = 0;
  for(let py=0; py<CH; py++){
    const y = py/CH;
    // 底付近を強く、水面付近を少しだけ光らせる
    const band = Math.max((y-0.5)/0.5, Math.max(0, 0.22-y)/0.22*0.5);
    for(let px=0; px<CW; px++){
      const x = px/CW;
      const v = Math.sin(x*10 + tt*2 + y*7)
              + Math.sin(y*13 - tt*1.7 + x*5)
              + Math.sin((x+y)*8 + tt*1.3);
      let inten = (v+3)/6;          // 0..1
      inten = inten*inten*inten;    // 明るい所だけ残す
      const a = band <= 0 ? 0 : Math.min(255, inten*band*330);
      d[i++] = 165; d[i++] = 228; d[i++] = 255; d[i++] = a;
    }
  }
  causticCtx.putImageData(causticImg, 0, 0);
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.55 * k;
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(causticCanvas, WALL, 0, W - WALL*2, H);
  ctx.restore();
}

// -------------------------------------------------------------------------
//  遠景シルエット（海藻・魚影）
// -------------------------------------------------------------------------
function newFish(){
  const dir = Math.random() < 0.5 ? 1 : -1;
  return {
    x: dir > 0 ? -50 : W + 50,
    y: 150 + Math.random()*(H - 320),
    dir,
    speed: 10 + Math.random()*22,
    size: 9 + Math.random()*16,
    phase: Math.random()*Math.PI*2,
    bob: 5 + Math.random()*10,
  };
}
function initScenery(){
  seaweeds = [];
  for(let i=0;i<6;i++){
    seaweeds.push({
      x: 40 + Math.random()*(W-80),
      h: 120 + Math.random()*170,
      w: 9 + Math.random()*9,
      phase: Math.random()*Math.PI*2,
      speed: 0.4 + Math.random()*0.5,
      sway: 12 + Math.random()*16,
    });
  }
  fishes = [];
  for(let i=0;i<4;i++) fishes.push(newFish());
}
function updateScenery(dt){
  for(const s of seaweeds) s.phase += s.speed*dt;
  for(const f of fishes){
    f.x += f.dir*f.speed*dt;
    f.phase += dt*3;
    if((f.dir > 0 && f.x > W+60) || (f.dir < 0 && f.x < -60)) Object.assign(f, newFish());
  }
}
function drawScenery(){
  ctx.save();
  // 海藻（底から生えて揺れる暗いシルエット）
  ctx.fillStyle = 'rgba(2,16,28,0.55)';
  for(const s of seaweeds){
    const rootY = FLOOR;
    const segs = 8;
    ctx.beginPath();
    // 左の縁：根元→先端
    for(let j=0;j<=segs;j++){
      const f = j/segs;
      const yy = rootY - f*s.h;
      const sway = Math.sin(s.phase + f*3)*s.sway*f;
      const half = (s.w*(1-f*0.7))/2;
      const xx = s.x + sway - half;
      j===0 ? ctx.moveTo(xx, yy) : ctx.lineTo(xx, yy);
    }
    // 右の縁：先端→根元
    for(let j=segs;j>=0;j--){
      const f = j/segs;
      const yy = rootY - f*s.h;
      const sway = Math.sin(s.phase + f*3)*s.sway*f;
      const half = (s.w*(1-f*0.7))/2;
      ctx.lineTo(s.x + sway + half, yy);
    }
    ctx.closePath();
    ctx.fill();
  }
  // 魚影（ゆっくり横切る）
  for(const f of fishes){
    const y = f.y + Math.sin(f.phase)*f.bob;
    ctx.save();
    ctx.translate(f.x, y);
    ctx.scale(f.dir, 1);
    ctx.fillStyle = 'rgba(3,18,30,0.5)';
    // 胴
    ctx.beginPath();
    ctx.ellipse(0, 0, f.size, f.size*0.5, 0, 0, Math.PI*2);
    ctx.fill();
    // 尾びれ
    ctx.beginPath();
    ctx.moveTo(-f.size*0.9, 0);
    ctx.lineTo(-f.size*1.6, -f.size*0.55);
    ctx.lineTo(-f.size*1.6, f.size*0.55);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}
function drawBubble(b, lifeMul){
  const lm = lifeMul === undefined ? 1 : lifeMul;
  const x = b.x + Math.sin(b.wobA)*b.wobAmp;
  ctx.save();
  // 本体（薄い塗り＋リング）
  ctx.globalAlpha = b.alpha*0.4*lm;
  ctx.fillStyle = 'rgba(180,230,255,1)';
  ctx.beginPath(); ctx.arc(x, b.y, b.r, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = b.alpha*lm;
  ctx.lineWidth = Math.max(0.8, b.r*0.16);
  ctx.strokeStyle = 'rgba(210,245,255,0.9)';
  ctx.beginPath(); ctx.arc(x, b.y, b.r, 0, Math.PI*2); ctx.stroke();
  // ハイライト
  ctx.globalAlpha = Math.min(1, b.alpha*2.2)*lm;
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath(); ctx.arc(x - b.r*0.34, b.y - b.r*0.34, Math.max(0.7, b.r*0.24), 0, Math.PI*2); ctx.fill();
  ctx.restore();
}
// 合体/着地で発生する泡
function spawnBubbles(x, y, n, spread){
  for(let i=0;i<n;i++){
    const r = 1.5 + Math.random()*5;
    popBubbles.push({
      x: x + (Math.random()-0.5)*spread,
      y: y + (Math.random()-0.5)*spread*0.4,
      r,
      speed: 40 + Math.random()*90 + r*4,
      wobA: Math.random()*Math.PI*2, wobF: 1 + Math.random()*2.2, wobAmp: 3 + Math.random()*8,
      alpha: 0.4 + Math.random()*0.35,
      life: 1,
    });
  }
}
// 発光フラッシュ（高ランク合体・キング消滅）
function triggerFlash(color, strength, x, y){
  if(strength <= flash) { /* keep位置は強い方 */ }
  flash = Math.max(flash, strength);
  flashColor = color;
  if(x !== undefined){ flashX = x; flashY = y; }
}
function drawMotes(){
  ctx.save();
  for(const m of motes){
    const tw = 0.45 + 0.55*Math.sin(m.ph);
    ctx.globalAlpha = m.a*tw;
    ctx.fillStyle = 'rgba(205,238,255,1)';
    ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}
// 上から差し込む光芒（ゴッドレイ）。intensity(0..1)で深度に応じ減衰。
function drawGodrays(t, intensity){
  const k = intensity === undefined ? 1 : intensity;
  if(k <= 0.01) return;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const rays = 5;
  for(let i=0;i<rays;i++){
    const sway = Math.sin(t*0.00025 + i*1.7)*46;
    const topX = W*(0.1 + i*0.2) + sway;
    const halfW = 34 + i*16;
    const drift = 150;                       // 下に行くほど左へ流れる角度
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0,   'rgba(150,225,255,'+(0.12*k)+')');
    g.addColorStop(0.45,'rgba(120,205,240,'+(0.05*k)+')');
    g.addColorStop(1,   'rgba(120,205,240,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(topX - halfW, -4);
    ctx.lineTo(topX + halfW, -4);
    ctx.lineTo(topX + halfW - drift, H);
    ctx.lineTo(topX - halfW - drift, H);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

// =========================================================================
//  描画 (§10)  — 物理は円、見た目だけ変形/表情
// =========================================================================
function draw(){
  // シェイクオフセット
  const sx = (Math.random()-0.5)*shakeAmt;
  const sy = (Math.random()-0.5)*shakeAmt;

  ctx.save();
  ctx.translate(sx, sy);

  // 背景（深海）
  drawBackground();

  // スライム
  for(const b of bodies){
    drawSlime(b);
  }

  // 待機スライム（投下口）
  if(state === 'playing' && current){
    drawWaiting();
  }

  // エフェクト
  drawEffects();

  // 前景（手前の泡・ビネット）
  drawForeground();

  ctx.restore();

  // 前景UI（シェイクの影響を受けない）
  drawHUD();
}

function drawBackground(){
  const t = performance.now();

  // 深海の縦グラデ（水深ゾーンで色が変化）
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,    envCol.top);
  g.addColorStop(0.55, envCol.mid);
  g.addColorStop(1,    envCol.bot);
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  // 水面からの光（深くなるほど弱まる）
  if(envCol.surf > 0.002){
    const surf = ctx.createLinearGradient(0,0,0,H*0.45);
    surf.addColorStop(0,'rgba(130,215,245,'+envCol.surf+')');
    surf.addColorStop(1,'rgba(130,215,245,0)');
    ctx.fillStyle = surf;
    ctx.fillRect(0,0,W,H*0.45);
  }

  // 遠景シルエット（海藻・魚影）— 光より奥
  drawScenery();

  // ゴッドレイ（深くなるほど弱まる）
  drawGodrays(t, envCol.ray);

  // コースティクス（揺らぐ網目光・深度で減衰）
  drawCaustics(t, Math.max(0.15, envCol.ray));

  // 背景の泡・マリンスノー
  for(const b of bubbles) if(!b.front) drawBubble(b);
  drawMotes();

  // 海流の流線
  drawTideStreaks();

  // ガラスの箱（側面・底）
  drawWalls();

  // 底より下の台座（音量ボタンを置く帯）
  drawBase();

  // デッドライン（発光する点線）
  drawDeadline(t);
}

function drawWalls(){
  ctx.save();
  // 側面・底のガラス（うっすら暗い）— 床(FLOOR)までの高さで描く
  ctx.fillStyle = 'rgba(6,26,44,0.35)';
  ctx.fillRect(0, 0, WALL, FLOOR);
  ctx.fillRect(W-WALL, 0, WALL, FLOOR);
  ctx.fillRect(0, FLOOR, W, WALL);
  // 内側の発光エッジ
  ctx.fillStyle = 'rgba(130,220,255,0.22)';
  ctx.fillRect(WALL-2, 0, 2, FLOOR);
  ctx.fillRect(W-WALL, 0, 2, FLOOR);
  ctx.fillRect(0, FLOOR, W, 2);
  // 床のやわらかい光
  const fg = ctx.createLinearGradient(0, FLOOR-46, 0, FLOOR);
  fg.addColorStop(0,'rgba(80,190,225,0)');
  fg.addColorStop(1,'rgba(80,190,225,0.12)');
  ctx.fillStyle = fg;
  ctx.fillRect(0, FLOOR-46, W, 46);
  ctx.restore();
}

// 床の下の台座帯（ここに音量ボタンが乗る）
function drawBase(){
  ctx.save();
  const y0 = FLOOR + WALL;
  const g = ctx.createLinearGradient(0, y0, 0, H);
  g.addColorStop(0, '#05192c');
  g.addColorStop(1, '#010a18');
  ctx.fillStyle = g;
  ctx.fillRect(0, y0, W, H - y0);
  // 上端の細い光ライン
  ctx.fillStyle = 'rgba(120,210,250,0.14)';
  ctx.fillRect(0, y0, W, 2);
  // 操作ガイド（プレイ中は常時・音量ボタンの左の空きに控えめに）
  if(state === 'playing'){
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 15px sans-serif';
    ctx.fillStyle = 'rgba(150,205,235,0.5)';
    ctx.fillText('スライドで ねらう ・ はなして 落とす', 26, y0 + (H - y0)/2);
  }
  ctx.restore();
}

function drawDeadline(t){
  if(state === 'ready') return;   // タイトル画面ではゲーム要素を出さない
  const danger = state === 'playing' && overLineTime > 0.05;
  const pulse = 0.5 + 0.5*Math.sin(t/150);
  ctx.save();
  ctx.strokeStyle = danger
    ? 'rgba(255,95,95,'+(0.55+0.45*pulse)+')'
    : 'rgba(120,230,255,'+(0.4+0.25*pulse)+')';
  ctx.shadowColor = danger ? 'rgba(255,80,80,0.9)' : 'rgba(120,230,255,0.8)';
  ctx.shadowBlur = danger ? 14 : 9;
  ctx.lineWidth = 2;
  ctx.setLineDash([14, 10]);
  ctx.lineDashOffset = -(t/40) % 24;
  ctx.beginPath();
  ctx.moveTo(WALL, DEAD_LINE);
  ctx.lineTo(W-WALL, DEAD_LINE);
  ctx.stroke();
  ctx.restore();
}

// 前景：手前を横切る泡＋深海ビネット
function drawForeground(){
  for(const b of bubbles) if(b.front) drawBubble(b);

  // 発光フラッシュ（合体地点から広がる光・add合成）
  if(flash > 0.01){
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const rad = Math.max(W, H) * (0.5 + (1 - flash)*0.6);
    const fg = ctx.createRadialGradient(flashX, flashY, 0, flashX, flashY, rad);
    fg.addColorStop(0, hexToRgba(flashColor, flash));
    fg.addColorStop(0.5, hexToRgba(flashColor, flash*0.4));
    fg.addColorStop(1, hexToRgba(flashColor, 0));
    ctx.fillStyle = fg;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // 深海ビネット
  const v = ctx.createRadialGradient(W/2, H*0.42, H*0.18, W/2, H*0.52, H*0.8);
  v.addColorStop(0, 'rgba(0,0,0,0)');
  v.addColorStop(1, 'rgba(0,8,18,0.55)');
  ctx.fillStyle = v;
  ctx.fillRect(0, 0, W, H);

  // 海流の予告・進行バナー
  drawTideBanner();
}

// 海流の流線（水中・スライムより奥）
function drawTideStreaks(){
  if(tide.phase === 'idle' || Math.abs(tide.vx) < 1) return;
  const a = tide.phase === 'active' ? tide.strength : 0.25;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.lineCap = 'round';
  ctx.lineWidth = 1.5;
  for(const s of tide.streaks){
    const x2 = s.x + tide.dir * s.len;
    const grad = ctx.createLinearGradient(s.x, 0, x2, 0);
    grad.addColorStop(0,   'rgba(150,220,255,0)');
    grad.addColorStop(0.5, 'rgba(150,220,255,'+(s.a*a*0.55)+')');
    grad.addColorStop(1,   'rgba(150,220,255,0)');
    ctx.strokeStyle = grad;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(x2, s.y);
    ctx.stroke();
  }
  ctx.restore();
}

// 海流のバナー（予告＝黄色点滅／発生＝青）＋端の流れティント
function drawTideBanner(){
  if(tide.phase === 'idle') return;
  const arrow = tide.dir > 0 ? '≫≫' : '≪≪';
  const txt = tide.dir > 0 ? arrow + ' かいりゅう ' + arrow : arrow + ' かいりゅう ' + arrow;
  let alpha, col;
  if(tide.phase === 'warn'){
    const blink = 0.5 + 0.5*Math.sin(performance.now()/110);
    alpha = 0.45 + 0.55*blink; col = '255,215,110';
  } else {
    alpha = 0.25 + 0.6*tide.strength; col = '150,225,255';
    // 流れ方向の端にうっすらティント
    ctx.save();
    const gx = tide.dir > 0 ? ctx.createLinearGradient(0,0,W,0) : ctx.createLinearGradient(W,0,0,0);
    gx.addColorStop(0, 'rgba(120,200,255,0)');
    gx.addColorStop(1, 'rgba(120,200,255,'+(0.10*tide.strength)+')');
    ctx.fillStyle = gx; ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = 'bold 22px sans-serif';
  ctx.fillStyle = 'rgba('+col+','+alpha+')';
  ctx.shadowColor = 'rgba(0,20,40,0.85)';
  ctx.shadowBlur = 8;
  ctx.fillText(txt, W/2, DEAD_LINE + 46);
  ctx.restore();
}

// ---- スライム本体描画 ----------------------------------------------------
function drawSlime(b){
  const s = b.plugin.slime;
  const r = s.r;
  const x = b.position.x, y = b.position.y;

  // squash 減衰
  s.squash *= 0.88;
  if(s.spawnPop > 0) s.spawnPop = Math.max(0, s.spawnPop - 0.06);

  // 速度・接地からの潰れ量
  const vy = b.position.y - s.prevY;
  s.prevY = b.position.y;
  const speed = Math.min(Math.hypot(b.velocity.x, b.velocity.y), 12);
  s.wobble += 0.08;

  // 縦横スケール（squash & stretch）
  let squashAmt = s.squash + Math.max(0, speed-2)*0.012;
  // ゆっくり揺れ
  const idle = Math.sin(s.wobble) * 0.02;
  let scaleY = 1 - squashAmt + idle;
  let scaleX = 1 + squashAmt*0.8 - idle;
  // spawn pop（生成時にぼよん）
  const pop = 1 + Math.sin(s.spawnPop*Math.PI)*0.18;
  scaleX *= pop; scaleY *= pop;

  const angle = b.angle;

  // 本体（真球シェーディング）はスカッシュのみ適用し、光源は常に左上に固定。
  // 顔とアクセサリだけを body.angle で回転させることで、球体は転がっても
  // シルエットが変わらず、表情だけがくるっと動く自然な見た目になる。
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scaleX, scaleY);
  if(s.special) drawSpecialBlob(0, 0, r, s.special, s);
  else drawBlob(0, 0, r, SLIMES[s.rank], s, angle);
  ctx.restore();
}

// 特殊スライムの描画（本体＋顔＋固有アイコン）
function drawSpecialBlob(cx, cy, r, kind, s){
  const ctx = gfx;
  const def = kind === 'bomb'
    ? { rank:0, color:'#3b4250', glow:'#ff6a3c' }
    : { rank:0, color:'#8fd0ff', rainbow:true };
  drawSlimeBody(cx, cy, r, def);
  drawFace(cx, cy, r, def, s);
  const t = performance.now()/1000;
  if(kind === 'bomb'){
    // 導火線＋パチパチする火花
    ctx.save();
    ctx.strokeStyle = 'rgba(180,170,160,0.9)';
    ctx.lineWidth = Math.max(2, r*0.07);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, cy - r*0.92);
    ctx.quadraticCurveTo(cx + r*0.28, cy - r*1.25, cx + r*0.1, cy - r*1.42);
    ctx.stroke();
    const sp = 0.6 + 0.4*Math.sin(t*22);
    ctx.fillStyle = 'rgba(255,210,90,'+sp+')';
    ctx.beginPath(); ctx.arc(cx + r*0.1, cy - r*1.44, r*0.13*sp + 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,120,40,'+(sp*0.85)+')';
    ctx.beginPath(); ctx.arc(cx + r*0.1, cy - r*1.44, r*0.06, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  } else {
    // ワイルド：きらめく星スパークル
    ctx.save();
    const tw = 0.6 + 0.4*Math.sin(t*4);
    ctx.fillStyle = 'rgba(255,255,255,'+tw+')';
    drawSparkle(cx + r*0.5, cy - r*0.72, r*0.26);
    drawSparkle(cx - r*0.55, cy - r*0.3, r*0.16);
    ctx.restore();
  }
}

// 4方向にとがる星のきらめき（gfxに描画）
function drawSparkle(cx, cy, s){
  const ctx = gfx;
  ctx.beginPath();
  ctx.moveTo(cx, cy - s);
  ctx.quadraticCurveTo(cx, cy, cx + s, cy);
  ctx.quadraticCurveTo(cx, cy, cx, cy + s);
  ctx.quadraticCurveTo(cx, cy, cx - s, cy);
  ctx.quadraticCurveTo(cx, cy, cx, cy - s);
  ctx.fill();
}

// スライム描画：本体（真球シェーディング）＋ 顔/アクセサリ（body.angle で回転）
function drawBlob(cx, cy, r, def, s, angle=0){
  const ctx = gfx;
  // マント（rank11）は本体の後ろに描く：王らしく背中でひるがえる
  if(def.rank === 11){
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.translate(-cx, -cy);
    drawCape(cx, cy, r);
    ctx.restore();
  }
  drawSlimeBody(cx, cy, r, def);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.translate(-cx, -cy);
  drawFace(cx, cy, r, def, s);
  drawAccessory(cx, cy, r, def);
  ctx.restore();
}

// 真球に見せる立体シェーディング（光源は常に左上・複数レイヤーで陰影を重ねる）
function drawSlimeBody(cx, cy, r, def){
  const ctx = gfx;
  // 生物発光グロー（深海）：本体の色で淡いハローを add 合成。上位ほど強く光る
  const glowCol = def.glow || (def.rainbow ? '#7fe6ff' : (def.metal ? '#d0b8ff' : def.color));
  const glowStr = 0.22 + Math.min(def.rank, 11)*0.02;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const gl = ctx.createRadialGradient(cx, cy, r*0.55, cx, cy, r*1.65);
  gl.addColorStop(0, hexToRgba(glowCol, glowStr));
  gl.addColorStop(1, hexToRgba(glowCol, 0));
  ctx.fillStyle = gl;
  ctx.beginPath();
  ctx.arc(cx, cy, r*1.65, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // 接地の落ち影（ぼかしグラデ）
  ctx.save();
  const sh = ctx.createRadialGradient(cx, cy + r*0.94, r*0.12, cx, cy + r*0.94, r*1.05);
  sh.addColorStop(0, 'rgba(0,10,20,0.38)');
  sh.addColorStop(1, 'rgba(0,10,20,0)');
  ctx.fillStyle = sh;
  ctx.beginPath();
  ctx.ellipse(cx, cy + r*0.94, r*1.02, r*0.3, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // 本体は真円。内側に陰影レイヤーを重ねて球体の立体感を作る
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.clip();

  // 1) ベースの塗り（左上を明るく、右下を暗く）
  let base;
  if(def.rainbow){
    base = ctx.createLinearGradient(cx - r, cy - r, cx + r, cy + r);
    base.addColorStop(0,   '#ff9ec1');
    base.addColorStop(0.25,'#ffd27f');
    base.addColorStop(0.5, '#a8e063');
    base.addColorStop(0.75,'#63c8e3');
    base.addColorStop(1,   '#b58fe6');
  } else if(def.metal){
    base = ctx.createLinearGradient(cx - r, cy - r, cx + r, cy + r);
    base.addColorStop(0,   '#ffffff');
    base.addColorStop(0.3, '#d9c2ff');
    base.addColorStop(0.55,'#9fe3ff');
    base.addColorStop(0.75,'#ffd0f0');
    base.addColorStop(1,   '#b7a2ff');
  } else {
    base = ctx.createRadialGradient(cx - r*0.32, cy - r*0.42, r*0.1, cx + r*0.05, cy + r*0.2, r*1.25);
    base.addColorStop(0,   lighten(def.color, 0.58));
    base.addColorStop(0.5, def.color);
    base.addColorStop(1,   darken(def.color, 0.30));
  }
  ctx.fillStyle = base;
  ctx.fillRect(cx - r, cy - r, r*2, r*2);

  // 2) コアシャドウ：右下を落として球の陰り側を表現
  const core = ctx.createRadialGradient(cx + r*0.2, cy + r*0.3, r*0.15, cx + r*0.1, cy + r*0.15, r*1.3);
  core.addColorStop(0,   'rgba(15,20,45,0)');
  core.addColorStop(0.65,'rgba(15,20,45,0)');
  core.addColorStop(1,   'rgba(15,20,45,0.32)');
  ctx.fillStyle = core;
  ctx.fillRect(cx - r, cy - r, r*2, r*2);

  // 3) 下側の照り返し（リムライト）で厚みを出す
  const rim = ctx.createRadialGradient(cx, cy + r*0.72, r*0.05, cx, cy + r*0.72, r*0.78);
  rim.addColorStop(0, 'rgba(255,255,255,0.30)');
  rim.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = rim;
  ctx.fillRect(cx - r, cy - r, r*2, r*2);

  // 4) 上部の広いツヤ（やわらかい面光源）
  const sheen = ctx.createRadialGradient(cx - r*0.3, cy - r*0.5, r*0.05, cx - r*0.3, cy - r*0.5, r*1.0);
  sheen.addColorStop(0,   'rgba(255,255,255,0.50)');
  sheen.addColorStop(0.55,'rgba(255,255,255,0.06)');
  sheen.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.fillStyle = sheen;
  ctx.fillRect(cx - r, cy - r, r*2, r*2);

  // ほし柄（rank9）
  if(def.rank === 9){
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    for(let i=0;i<7;i++){
      const px = cx + Math.sin(i*2.3)*r*0.6;
      const py = cy + Math.cos(i*1.7)*r*0.55;
      star(px, py, 5, r*0.12, r*0.05);
    }
  }
  ctx.restore(); // clip 解除

  // もこもこ縁（rank10）
  if(def.rank === 10){
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 3;
    const bumps = 18;
    ctx.beginPath();
    for(let i=0;i<=bumps;i++){
      const a = (i/bumps)*Math.PI*2;
      const rr = r*0.99 + Math.sin(a*bumps)*2;
      const px = cx + Math.cos(a)*rr;
      const py = cy + Math.sin(a)*rr;
      i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
    }
    ctx.stroke();
    ctx.restore();
  }

  // やわらかい輪郭（薄め）
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.lineWidth = Math.max(1.5, r*0.025);
  ctx.globalAlpha = 0.45;
  ctx.strokeStyle = darken(def.color, 0.28);
  ctx.stroke();
  ctx.restore();

  // 鋭いスペキュラハイライト（ツヤの芯・ガラス玉のような光沢）
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath();
  ctx.ellipse(cx - r*0.34, cy - r*0.4, r*0.2, r*0.13, -0.5, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 0.75;
  ctx.beginPath();
  ctx.ellipse(cx - r*0.1, cy - r*0.6, r*0.08, r*0.05, 0.2, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// ---- 顔の描き分け (§10, §14: ここが肝) -----------------------------------
function drawFace(cx, cy, r, def, s){
  const ctx = gfx;
  const rank = def.rank;
  // まばたき
  s.blink -= 1/60;
  if(s.blink < 0){ s.blinkPhase = 0.16; s.blink = 2 + Math.random()*3; }
  if(s.blinkPhase > 0) s.blinkPhase -= 1/60;
  const blinking = s.blinkPhase > 0;

  const eyeY = cy - r*0.05;
  const eyeDX = r*0.34;
  const eyeR = r*0.16;

  ctx.save();

  // 目のスタイルをランクで変える
  function eye(ex, ey){
    if(blinking){
      // 閉じ目（にっこり）
      ctx.strokeStyle = '#2a2a33';
      ctx.lineWidth = Math.max(2, r*0.05);
      ctx.beginPath();
      ctx.arc(ex, ey, eyeR*0.9, Math.PI*0.15, Math.PI*0.85);
      ctx.stroke();
      return;
    }
    // 白目（上位ほど大きくきらきら）
    ctx.fillStyle = '#2a2a33';
    ctx.beginPath();
    ctx.ellipse(ex, ey, eyeR*0.85, eyeR*1.05, 0, 0, Math.PI*2);
    ctx.fill();
    // ハイライト
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ex - eyeR*0.3, ey - eyeR*0.35, eyeR*0.32, 0, Math.PI*2);
    ctx.fill();
    if(rank >= 6){ // 上位はキラキラ追加
      ctx.beginPath();
      ctx.arc(ex + eyeR*0.25, ey + eyeR*0.25, eyeR*0.16, 0, Math.PI*2);
      ctx.fill();
    }
  }

  eye(cx - eyeDX, eyeY);
  eye(cx + eyeDX, eyeY);

  // ほっぺ (rank3,4 + それ以上でもうっすら)
  if(rank >= 3){
    ctx.fillStyle = 'rgba(255,140,160,'+(rank>=3?0.5:0.3)+')';
    ctx.beginPath();
    ctx.arc(cx - r*0.55, eyeY + r*0.18, r*0.13, 0, Math.PI*2);
    ctx.arc(cx + r*0.55, eyeY + r*0.18, r*0.13, 0, Math.PI*2);
    ctx.fill();
  }

  // 口（ランクで表情変化）
  ctx.strokeStyle = '#2a2a33';
  ctx.lineWidth = Math.max(2, r*0.045);
  ctx.lineCap = 'round';
  const my = cy + r*0.28;
  ctx.beginPath();
  if(rank <= 2){
    // ちいさな　ω 口
    ctx.arc(cx - r*0.08, my, r*0.08, 0, Math.PI);
    ctx.arc(cx + r*0.08, my, r*0.08, 0, Math.PI);
  } else if(rank <= 5){
    // にっこり
    ctx.arc(cx, my - r*0.05, r*0.2, 0.15*Math.PI, 0.85*Math.PI);
  } else if(rank <= 8){
    // 大きめにっこり（口内うっすら）
    ctx.arc(cx, my - r*0.1, r*0.26, 0.1*Math.PI, 0.9*Math.PI);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,120,140,0.5)';
    ctx.beginPath();
    ctx.arc(cx, my - r*0.02, r*0.12, 0, Math.PI);
    ctx.fill();
    ctx.beginPath();
  } else {
    // にんまり（ドヤ）
    ctx.moveTo(cx - r*0.24, my - r*0.04);
    ctx.quadraticCurveTo(cx, my + r*0.22, cx + r*0.24, my - r*0.04);
  }
  ctx.stroke();

  ctx.restore();
}

// ---- アクセサリ (§2) -----------------------------------------------------
function drawAccessory(cx, cy, r, def){
  const ctx = gfx;
  const rank = def.rank;
  ctx.save();
  // ツノ1本 (rank5,6)
  if(rank === 5 || rank === 6){
    ctx.fillStyle = rank===6 ? '#ff9ec4' : '#c8a0ff';
    ctx.strokeStyle = darken(ctx.fillStyle,0.2);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - r*0.12, cy - r*0.9);
    ctx.lineTo(cx, cy - r*1.35);
    ctx.lineTo(cx + r*0.12, cy - r*0.9);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }
  // 王冠 (rank7,8,11)
  if(rank === 7 || rank === 8 || rank === 11){
    drawCrown(cx, cy - r*0.98, r*0.5);
  }
  // 羽 (rank8)
  if(rank === 8){
    drawWings(cx, cy, r);
  }
  ctx.restore();
}

// 王のマント（本体の背面に描画される。左右と裾が体からはみ出して見える）
function drawCape(cx, cy, r){
  const ctx = gfx;
  ctx.save();
  const grad = ctx.createLinearGradient(cx, cy - r*0.6, cx, cy + r*1.25);
  grad.addColorStop(0, 'rgba(225,60,100,0.95)');
  grad.addColorStop(1, 'rgba(150,20,60,0.95)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(cx - r*0.55, cy - r*0.72);
  ctx.quadraticCurveTo(cx - r*1.35, cy + r*0.55, cx - r*0.72, cy + r*1.18);
  ctx.quadraticCurveTo(cx - r*0.35, cy + r*0.95, cx, cy + r*1.22);
  ctx.quadraticCurveTo(cx + r*0.35, cy + r*0.95, cx + r*0.72, cy + r*1.18);
  ctx.quadraticCurveTo(cx + r*1.35, cy + r*0.55, cx + r*0.55, cy - r*0.72);
  ctx.closePath();
  ctx.fill();
  // 内側のやわらかい陰
  ctx.globalAlpha = 0.35;
  ctx.strokeStyle = 'rgba(90,10,40,0.9)';
  ctx.lineWidth = Math.max(2, r*0.05);
  ctx.stroke();
  ctx.restore();
}

function drawCrown(cx, cy, w){
  const ctx = gfx;
  ctx.save();
  ctx.fillStyle = '#ffd54a';
  ctx.strokeStyle = '#e0a800';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - w, cy);
  ctx.lineTo(cx - w, cy - w*0.8);
  ctx.lineTo(cx - w*0.45, cy - w*0.25);
  ctx.lineTo(cx, cy - w*1.0);
  ctx.lineTo(cx + w*0.45, cy - w*0.25);
  ctx.lineTo(cx + w, cy - w*0.8);
  ctx.lineTo(cx + w, cy);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // 宝石
  ctx.fillStyle = '#ff5a7a';
  ctx.beginPath(); ctx.arc(cx, cy - w*0.25, w*0.14, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawWings(cx, cy, r){
  const ctx = gfx;
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.strokeStyle = 'rgba(180,200,255,0.9)';
  ctx.lineWidth = 2;
  for(const dir of [-1, 1]){
    ctx.beginPath();
    ctx.moveTo(cx + dir*r*0.7, cy - r*0.1);
    ctx.quadraticCurveTo(cx + dir*r*1.5, cy - r*0.6, cx + dir*r*1.4, cy + r*0.1);
    ctx.quadraticCurveTo(cx + dir*r*1.3, cy + r*0.4, cx + dir*r*0.7, cy + r*0.2);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }
  ctx.restore();
}

// ---- 待機スライム & next --------------------------------------------------
function drawWaiting(){
  const r = itemRadius(current);
  const x = clampDropX(r);
  const y = DEAD_LINE - 30;
  // ガイドライン
  ctx.save();
  ctx.strokeStyle = 'rgba(120,180,220,0.5)';
  ctx.lineWidth = 2;
  ctx.setLineDash([6,8]);
  ctx.beginPath();
  ctx.moveTo(x, y + r);
  ctx.lineTo(x, FLOOR);
  ctx.stroke();
  ctx.restore();

  // ふわふわ揺れ
  const bob = Math.sin(performance.now()/300)*4;
  ctx.save();
  ctx.translate(x, y + bob);
  const dummy = { blink: 99, blinkPhase:0, wobble: performance.now()/300 };
  if(current.special) drawSpecialBlob(0, 0, r, current.special, dummy);
  else drawBlob(0, 0, r, SLIMES[current.rank], dummy, 0);
  ctx.restore();
}

// ---- エフェクト描画 ------------------------------------------------------
function drawEffects(){
  // 合体/着地で発生した泡（スライムの手前を上昇）
  for(const b of popBubbles) drawBubble(b, Math.max(0, Math.min(1, b.life*1.2)));
  // リング
  for(const rg of rings){
    ctx.save();
    ctx.globalAlpha = Math.max(0, rg.life)*0.6;
    ctx.strokeStyle = rg.color;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(rg.x, rg.y, rg.r, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }
  // 粒
  for(const p of particles){
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  // スコアポップ
  for(const sp of scorePops){
    ctx.save();
    ctx.globalAlpha = Math.max(0, sp.life);
    ctx.textAlign = 'center';
    ctx.fillStyle = sp.big ? '#ff5a7a' : '#3a6a8a';
    ctx.font = (sp.big?'bold ':'bold ') + (sp.big?30:22) + 'px sans-serif';
    ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.strokeText(sp.text, sp.x, sp.y);
    ctx.fillText(sp.text, sp.x, sp.y);
    if(sp.sub){
      ctx.fillStyle = '#ff8a3a';
      ctx.font = 'bold 18px sans-serif';
      ctx.strokeText(sp.sub, sp.x, sp.y - 24);
      ctx.fillText(sp.sub, sp.x, sp.y - 24);
    }
    ctx.restore();
  }
}

// ---- HUD (§3) ------------------------------------------------------------
function drawHUD(){
  if(state === 'ready') return;   // タイトル画面ではHUDを出さない
  ctx.save();
  // 深海の暗背景でも読めるよう、明色＋淡いグロー
  ctx.shadowColor = 'rgba(10,40,70,0.9)';
  ctx.shadowBlur = 8;
  // スコア
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(190,230,255,0.85)';
  ctx.font = 'bold 26px sans-serif';
  ctx.fillText('SCORE', 40, 46);
  ctx.fillStyle = '#f2fbff';
  ctx.font = 'bold 42px sans-serif';
  ctx.fillText(String(score), 40, 90);

  ctx.font = 'bold 16px sans-serif';
  ctx.fillStyle = 'rgba(150,200,230,0.75)';
  ctx.fillText('BEST ' + bestScore, 42, 112);

  // 水深とゾーン名
  ctx.fillStyle = 'rgba(140,225,255,0.92)';
  ctx.font = 'bold 17px sans-serif';
  ctx.fillText('▼ ' + depthM + ' m', 42, 136);
  ctx.fillStyle = 'rgba(150,205,235,0.7)';
  ctx.font = 'bold 12px sans-serif';
  ctx.fillText(zoneName, 42, 154);

  // Next プレビュー
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(190,230,255,0.85)';
  ctx.font = 'bold 22px sans-serif';
  ctx.fillText('NEXT', W - 40, 44);
  ctx.shadowBlur = 0;
  const nrExact = itemRadius(nextItem);
  const nx = W - 62, ny = 84, nr = Math.min(nrExact, 26);
  const dummy = { blink:99, blinkPhase:0, wobble: performance.now()/300 };
  ctx.save();
  ctx.translate(nx, ny);
  const sc = nr / nrExact;
  ctx.scale(sc, sc);
  if(nextItem.special) drawSpecialBlob(0, 0, nrExact, nextItem.special, dummy);
  else drawBlob(0, 0, nrExact, SLIMES[nextItem.rank], dummy, 0);
  ctx.restore();

  ctx.restore();
}

// =========================================================================
//  メインループ
// =========================================================================
let lastTime = performance.now();
function loop(now){
  const dt = Math.min((now - lastTime) / 1000, 0.033);
  lastTime = now;

  if(state === 'playing'){
    // クールダウン処理
    if(!canDrop && now >= dropCooldownUntil){
      canDrop = true;
      if(!current) prepareNext();
    }
    updateTide(dt);        // 海流のフェーズ更新
    applyTideForce();      // 物理更新前に海流の力を加える
    Engine.update(engine, 1000/60);

    // 連鎖タイマー減衰
    if(chainTimer > 0){
      chainTimer -= dt;
      if(chainTimer <= 0) chainCount = 0;
    }

    checkGameOver(dt);
  }

  updateEffects(dt);
  updateAmbient(dt);   // 深海の泡・マリンスノーは常時アニメ
  updateScenery(dt);   // 海藻・魚影
  updateDepth();       // 水深ゾーン（背景色・光量）
  flash *= 0.90;       // 発光フラッシュの減衰
  if(flash < 0.01) flash = 0;
  shakeAmt *= 0.85;
  if(shakeAmt < 0.3) shakeAmt = 0;

  draw();
  requestAnimationFrame(loop);
}

// =========================================================================
//  入力 (§4)
// =========================================================================
function canvasXFromClient(clientX){
  const rect = canvas.getBoundingClientRect();
  return (clientX - rect.left) / rect.width * W;
}

// 本家スイカゲーム式：押している間は左右に動かして狙い、指/ボタンを離した位置で投下。
// （クイックタップも「短い長押し」として離した瞬間に落ちる）
let pointerActive = false;

canvas.addEventListener('pointermove', (e) => {
  pointerX = canvasXFromClient(e.clientX);
});
canvas.addEventListener('pointerdown', (e) => {
  pointerX = canvasXFromClient(e.clientX);
  pointerActive = true;
  SFX.resume();
  try { canvas.setPointerCapture(e.pointerId); } catch(_) {}
});
window.addEventListener('pointerup', () => {
  if(!pointerActive) return;
  pointerActive = false;
  dropCurrent();   // 離した位置に落とす
});
window.addEventListener('pointercancel', () => { pointerActive = false; });

window.addEventListener('keydown', (e) => {
  if(state !== 'playing') return;
  const step = 24;
  if(e.key === 'ArrowLeft'){ pointerX -= step; e.preventDefault(); }
  else if(e.key === 'ArrowRight'){ pointerX += step; e.preventDefault(); }
  else if(e.key === ' ' || e.key === 'ArrowDown'){ SFX.resume(); dropCurrent(); e.preventDefault(); }
  pointerX = Math.max(WALL, Math.min(W-WALL, pointerX));
});

// prevent scroll on touch（ただし図鑑グリッド内の縦スクロールは許可）
document.addEventListener('touchmove', (e)=>{
  if(e.target && e.target.closest && e.target.closest('#dexGrid')) return;
  e.preventDefault();
}, { passive:false });

// =========================================================================
//  ゲーム開始 / リセット
// =========================================================================
function resetGame(){
  // 物理世界クリア
  if(world){
    for(const b of [...bodies]) World.remove(world, b);
  }
  bodies = [];
  particles = []; rings = []; scorePops = []; popBubbles = []; flash = 0;
  score = 0;
  maxRankReached = 1;
  chainCount = 0; chainTimer = 0;
  overLineTime = 0;
  canDrop = true;
  current = null;
  nextItem = randomDropItem();
  prepareNext();
  initTide();
  startedAt = performance.now();
  state = 'playing';
}

function startGame(){
  SFX.resume();
  document.getElementById('startOverlay').classList.remove('show');
  document.getElementById('overOverlay').classList.remove('show');
  resetGame();
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);
document.getElementById('mute').addEventListener('click', (e) => {
  const m = SFX.toggle();
  e.currentTarget.textContent = m ? '🔇' : '🔊';
});

// -------------------------------------------------------------------------
//  図鑑（コレクション）
// -------------------------------------------------------------------------
function drawDexLocked(g, size){
  g.save();
  g.fillStyle = 'rgba(120,160,190,0.16)';
  g.beginPath(); g.arc(size/2, size*0.54, size*0.3, 0, Math.PI*2); g.fill();
  g.fillStyle = 'rgba(200,230,255,0.5)';
  g.font = 'bold 26px sans-serif'; g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText('?', size/2, size*0.56);
  g.restore();
}
// 既存のスライム描画を流用（出力先を一時的に g に差し替え）
function dexDrawRank(g, size, rank){
  const prev = gfx; gfx = g;
  const dummy = { blink:99, blinkPhase:0, wobble:0, squash:0, spawnPop:0 };
  drawBlob(size/2, size*0.56, size*0.3, SLIMES[rank], dummy, 0);
  gfx = prev;
}
function dexDrawSpecial(g, size, kind){
  const prev = gfx; gfx = g;
  const dummy = { blink:99, blinkPhase:0, wobble:0, squash:0, spawnPop:0 };
  drawSpecialBlob(size/2, size*0.56, size*0.27, kind, dummy);
  gfx = prev;
}
function makeDexCell(dpr, size, known, name, desc, drawKnown){
  const cell = document.createElement('div');
  cell.className = 'dexCell' + (known ? '' : ' locked');
  const cv = document.createElement('canvas');
  cv.width = size*dpr; cv.height = size*dpr;
  cv.style.width = size+'px'; cv.style.height = size+'px';
  const g = cv.getContext('2d');
  g.setTransform(dpr, 0, 0, dpr, 0, 0);
  if(known) drawKnown(g); else drawDexLocked(g, size);
  const nm = document.createElement('div'); nm.className = 'nm';
  nm.textContent = known ? name : '???';
  const ds = document.createElement('div'); ds.className = 'ds';
  ds.textContent = known ? desc : 'みはっけん';
  cell.appendChild(cv); cell.appendChild(nm); cell.appendChild(ds);
  return cell;
}

function buildDex(){
  const grid = document.getElementById('dexGrid');
  grid.innerHTML = '';
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const size = 66;
  for(let rank=1; rank<=MAX_RANK; rank++){
    const def = SLIMES[rank];
    grid.appendChild(makeDexCell(dpr, size, discovered.has(rank), def.name, def.desc,
      (g) => dexDrawRank(g, size, rank)));
  }
  for(const kind of SPECIAL_KINDS){
    const sp = SPECIALS[kind];
    grid.appendChild(makeDexCell(dpr, size, discovered.has(kind), sp.name, sp.desc,
      (g) => dexDrawSpecial(g, size, kind)));
  }
  const total = MAX_RANK + SPECIAL_KINDS.length;
  document.getElementById('dexProgress').textContent = 'はっけん ' + discovered.size + ' / ' + total;
}

function openDex(){ buildDex(); document.getElementById('dexOverlay').classList.add('show'); }
function closeDex(){ document.getElementById('dexOverlay').classList.remove('show'); }
document.getElementById('dexBtnStart').addEventListener('click', openDex);
document.getElementById('dexBtnOver').addEventListener('click', openDex);
document.getElementById('dexClose').addEventListener('click', closeDex);

// =========================================================================
//  カラーユーティリティ
// =========================================================================
function hexToRgb(hex){
  const h = hex.replace('#','');
  return { r:parseInt(h.slice(0,2),16), g:parseInt(h.slice(2,4),16), b:parseInt(h.slice(4,6),16) };
}
function hexToRgba(hex, a){
  const c = hexToRgb(hex);
  return `rgba(${c.r},${c.g},${c.b},${a})`;
}
function lighten(hex, amt){
  const c = hexToRgb(hex);
  return `rgb(${Math.round(c.r+(255-c.r)*amt)},${Math.round(c.g+(255-c.g)*amt)},${Math.round(c.b+(255-c.b)*amt)})`;
}
function darken(hex, amt){
  if(hex[0] !== '#') return hex;
  const c = hexToRgb(hex);
  return `rgb(${Math.round(c.r*(1-amt))},${Math.round(c.g*(1-amt))},${Math.round(c.b*(1-amt))})`;
}
function star(cx, cy, spikes, outer, inner){
  const ctx = gfx;
  let rot = -Math.PI/2;
  const step = Math.PI/spikes;
  ctx.beginPath();
  ctx.moveTo(cx, cy - outer);
  for(let i=0;i<spikes;i++){
    let x = cx + Math.cos(rot)*outer, y = cy + Math.sin(rot)*outer; ctx.lineTo(x,y); rot+=step;
    x = cx + Math.cos(rot)*inner; y = cy + Math.sin(rot)*inner; ctx.lineTo(x,y); rot+=step;
  }
  ctx.closePath();
  ctx.fill();
}

// タイトルのヒーロービジュアル（キング＋おともスライム）をゲーム描画で生成
function drawTitleHero(){
  const cv = document.getElementById('heroSlime');
  if(!cv) return;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = 260, h = 150;
  cv.width = w*dpr; cv.height = h*dpr;
  cv.style.width = w + 'px'; cv.style.height = h + 'px';
  const g = cv.getContext('2d');
  g.setTransform(dpr, 0, 0, dpr, 0, 0);
  const prev = gfx; gfx = g;
  const dummy = { blink:99, blinkPhase:0, wobble:0, squash:0, spawnPop:0 };
  drawBlob(50, 112, 20, SLIMES[1], dummy, 0);    // おとも（しずく）
  drawBlob(212, 108, 25, SLIMES[3], dummy, 0);   // おとも（ぷにまる）
  drawBlob(131, 90, 46, SLIMES[11], dummy, 0);   // 主役（スライムキング）
  gfx = prev;
}

// タイトルにベストスコアチップ（記録があるときだけ）
function updateTitleBest(){
  const tb = document.getElementById('titleBest');
  if(tb && bestScore > 0){
    tb.hidden = false;
    tb.textContent = '🏆 BEST ' + bestScore;
  }
}

computeLogicalSize();
fitStage();
setupPhysics();
initAmbient();
initCaustics();
initScenery();
drawTitleHero();
updateTitleBest();
requestAnimationFrame(loop);

})();
